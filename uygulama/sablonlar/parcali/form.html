<form method="post" action="{{ url_for('sonuc_sayfasi') }}" class="form-grid" id="risk-formu" novalidate>

  <fieldset class="field-group">
    <legend>
      <span class="leg-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
      </span>
      Kişisel Bilgiler
    </legend>

    <label class="field">
      <span class="field-label">Yaş <em>yıl</em></span>
      <input type="number" name="age" min="21" max="90" step="1" required placeholder="Örn: 32"
        value="{{ form_data.get('age', '') if form_data else '' }}" />
      <span class="field-hint">21 - 90 arası</span>
    </label>

    <label class="field">
      <span class="field-label">Gebelik Sayısı</span>
      <input type="number" name="pregnancies" min="0" max="17" step="1" required placeholder="Örn: 2"
        value="{{ form_data.get('pregnancies', '') if form_data else '' }}" />
      <span class="field-hint">0 - 17 arası</span>
    </label>

    <label class="field">
      <span class="field-label">Soyağacı Fonksiyonu (DPF)</span>
      <input type="number" name="diabetes_pedigree_function" min="0.05" max="2.5" step="0.001" required placeholder="Örn: 0.627"
        value="{{ form_data.get('diabetes_pedigree_function', '') if form_data else '' }}" />
      <span class="field-hint">0.05 - 2.5 arası</span>
    </label>
  </fieldset>

  <fieldset class="field-group">
    <legend>
      <span class="leg-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </span>
      Klinik Ölçümler
    </legend>

    <label class="field">
      <span class="field-label">Glikoz <em>mg/dL</em></span>
      <input type="number" name="glucose" min="50" max="300" step="0.1" required placeholder="Örn: 120"
        value="{{ form_data.get('glucose', '') if form_data else '' }}" />
      <span class="field-hint">50 - 300 mg/dL arası</span>
    </label>

    <label class="field">
      <span class="field-label">Kan Basıncı <em>mmHg</em></span>
      <input type="number" name="blood_pressure" min="40" max="130" step="0.1" required placeholder="Örn: 72"
        value="{{ form_data.get('blood_pressure', '') if form_data else '' }}" />
      <span class="field-hint">40 - 130 mmHg arası</span>
    </label>

    <label class="field">
      <span class="field-label">Cilt Kalınlığı <em>mm</em></span>
      <input type="number" name="skin_thickness" min="7" max="70" step="0.1" required placeholder="Örn: 35"
        value="{{ form_data.get('skin_thickness', '') if form_data else '' }}" />
      <span class="field-hint">7 - 70 mm arası</span>
    </label>

    <label class="field">
      <span class="field-label">İnsülin <em>µU/mL</em></span>
      <input type="number" name="insulin" min="10" max="850" step="0.1" required placeholder="Örn: 120"
        value="{{ form_data.get('insulin', '') if form_data else '' }}" />
      <span class="field-hint">10 - 850 µU/mL arası</span>
    </label>

    <label class="field">
      <span class="field-label">Vücut Kitle İndeksi <em>kg/m²</em></span>
      <input type="number" name="bmi" min="15" max="70" step="0.1" required placeholder="Örn: 33.6"
        value="{{ form_data.get('bmi', '') if form_data else '' }}" />
      <span class="field-hint">15 - 70 kg/m² arası</span>
    </label>
  </fieldset>

  <div class="form-foot">
    <div class="progress" aria-hidden="true">
      <div class="progress-bar" id="form-progress"></div>
      <span class="progress-text"><span id="form-progress-count">0</span>/8 alan dolduruldu</span>
    </div>
    <div class="form-actions">
      <button type="reset" class="btn btn-ghost">Temizle</button>
      <button type="submit" class="btn btn-primary">
        <span>Riski Hesapla</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</form>
